# =============================================================
#  application.properties
#  Spring Boot reads this file automatically on startup.
#  It configures how your app connects to the database.
# =============================================================

# ── Database connection ───────────────────────────────────────
# STEP: Replace "yourpassword" with your actual Postgres password.
# The DB name "starter_db" should match what you created earlier.
spring.datasource.url=jdbc:postgresql://localhost:5432/starter_db
spring.datasource.username=postgres
spring.datasource.password=projectpokedex
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────
# "validate" = Hibernate checks that your @Entity fields match the DB
# columns on startup, but does NOT create or alter any tables.
# Use this because your schema already exists from the seed script.
# If you see errors on startup, it usually means a field name or
# column type in your entity doesn't match the actual DB column.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Prints the SQL Hibernate runs in the console — very useful while learning.
# Set to false once you're done debugging.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── CORS (Cross-Origin Resource Sharing) ─────────────────────
# When your React frontend (running on port 5173) calls this API
# (running on port 8080), the browser blocks it by default because
# they're on different ports (different "origins").
# We'll handle CORS at the controller level with @CrossOrigin,
# but this is here as a reminder of what port your frontend will use.
# Frontend dev server URL: http://localhost:5173
